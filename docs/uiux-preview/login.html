<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiriusX - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); padding: 48px; width: 100%; max-width: 420px; }
        .logo { font-size: 36px; font-weight: 700; color: #0066cc; text-align: center; margin-bottom: 12px; font-family: Georgia, serif; }
        .subtitle { text-align: center; color: #666; margin-bottom: 32px; font-size: 18px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: #333; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 15px; transition: all 0.2s; }
        .form-group input:focus { outline: none; border-color: #0066cc; box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1); }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
        .checkbox-group input { width: auto; }
        .login-btn { width: 100%; padding: 14px; background: #0066cc; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .login-btn:hover { background: #0052a3; }
        .signup-link { text-align: center; margin-top: 24px; color: #666; font-size: 14px; }
        .signup-link a { color: #0066cc; text-decoration: none; font-weight: 500; }
        .signup-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">SiriusX</div>
        <div class="subtitle">Welcome back</div>
        <form>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="remember">
                <label for="remember" style="margin:0;">Remember me</label>
            </div>
            <button type="submit" class="login-btn">Log in</button>
        </form>
        <div class="signup-link">
            Don't have an account? <a href="#">Sign up</a>
        </div>
    </div>
</body>
</html>

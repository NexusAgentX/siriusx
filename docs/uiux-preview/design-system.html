<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiriusX - 设计系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fafafa; color: #1d1d1f; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        h1 { font-size: 42px; font-weight: 700; margin-bottom: 40px; font-family: Georgia, serif; text-align: center; }
        h2 { font-size: 28px; font-weight: 600; margin: 40px 0 20px; }
        .section { background: white; padding: 32px; border-radius: 12px; margin-bottom: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .color-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
        .color-swatch { height: 100px; border-radius: 8px; display: flex; align-items: flex-end; padding: 12px; color: white; font-weight: 600; font-size: 14px; }
        .primary { background: #0066cc; }
        .secondary { background: #6c757d; }
        .success { background: #4caf50; }
        .warning { background: #ff9800; }
        .destructive { background: #f44336; }
        .button-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
        .btn { padding: 12px 24px; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-default { background: #0066cc; color: white; }
        .btn-default:hover { background: #0052a3; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-outline { background: white; color: #0066cc; border: 1px solid #0066cc; }
        .btn-destructive { background: #f44336; color: white; }
        .badge-grid { display: flex; gap: 12px; flex-wrap: wrap; }
        .badge { padding: 6px 12px; border-radius: 12px; font-size: 13px; font-weight: 500; }
        .badge-running { background: #e3f2fd; color: #1976d2; border: 1px solid #90caf9; }
        .badge-completed { background: #e8f5e9; color: #2e7d32; border: 1px solid #81c784; }
        .badge-failed { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .badge-queued { background: #f5f5f5; color: #666; border: 1px solid #e0e0e0; }
        .typo-example { margin-bottom: 16px; }
        .font-serif { font-family: Georgia, serif; }
        .font-mono { font-family: 'Courier New', monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SiriusX 设计系统</h1>

        <div class="section">
            <h2>颜色系统</h2>
            <div class="color-grid">
                <div class="color-swatch primary">Primary<br>#0066cc</div>
                <div class="color-swatch secondary">Secondary<br>#6c757d</div>
                <div class="color-swatch success">Success<br>#4caf50</div>
                <div class="color-swatch warning">Warning<br>#ff9800</div>
                <div class="color-swatch destructive">Destructive<br>#f44336</div>
            </div>
        </div>

        <div class="section">
            <h2>按钮组件</h2>
            <div class="button-grid">
                <button class="btn btn-default">Default Button</button>
                <button class="btn btn-secondary">Secondary Button</button>
                <button class="btn btn-outline">Outline Button</button>
                <button class="btn btn-destructive">Destructive Button</button>
            </div>
        </div>

        <div class="section">
            <h2>Badge 组件</h2>
            <div class="badge-grid">
                <span class="badge badge-running">Running</span>
                <span class="badge badge-completed">Completed</span>
                <span class="badge badge-failed">Failed</span>
                <span class="badge badge-queued">Queued</span>
            </div>
        </div>

        <div class="section">
            <h2>字体系统</h2>
            <div class="typo-example font-serif" style="font-size:36px;font-weight:700;">
                标题字体 - Georgia Serif
            </div>
            <div class="typo-example" style="font-size:16px;">
                正文字体 - System Sans-Serif
            </div>
            <div class="typo-example font-mono" style="font-size:14px;">
                代码字体 - Courier New Monospace
            </div>
        </div>

        <div class="section">
            <h2>图标系统 (Emoji 示例)</h2>
            <div style="font-size:32px;display:flex;gap:16px;">
                📦 🔍 🐛 🔬 ✨ 📝 💬 📁 ✓ ✗ ⚠️ 🔧
            </div>
        </div>
    </div>
</body>
</html>
